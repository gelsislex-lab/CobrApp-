<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CobrApp · Universidad de O'Higgins</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #060f18;
    --navy2: #0d1b2a;
    --navy3: #0a2030;
    --border: #1e3a55;
    --gold: #c9a84c;
    --gold2: #e8c96a;
    --gold3: #e8d5a0;
    --blue: #60b4ff;
    --red: #ff7070;
    --green: #70e070;
    --muted: #7a9bb5;
    --text: #c8d8e8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--navy); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

  /* Header */
  header {
    background: var(--navy2); border-bottom: 1px solid var(--border);
    padding: 14px 24px; display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 50;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 38px; height: 38px; border-radius: 9px;
    background: linear-gradient(135deg, #c9a84c, #e8c96a);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-weight: 900; font-size: 20px; color: #0d1b2a;
  }
  .logo-name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 17px; color: var(--gold2); letter-spacing: 1px; }
  .logo-sub { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
  .header-right { font-size: 11px; color: #4a7a9b; text-align: right; line-height: 1.6; }

  /* Layout */
  .main { max-width: 780px; margin: 0 auto; padding: 28px 20px 60px; }

  /* Page title */
  .page-title { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--gold3); font-weight: 700; }
  .page-sub { font-size: 12px; color: #4a7a9b; margin-top: 6px; }

  /* Stats grid */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 24px 0 12px; }
  .stat-card {
    background: var(--navy2); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 20px;
  }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
  .stat-value { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; margin-top: 6px; }
  .stat-sub { font-size: 11px; color: #4a7a9b; margin-top: 4px; }

  /* Cartera total */
  .cartera {
    background: linear-gradient(135deg, #0d1b2a, #0a2a1a);
    border: 1px solid #2a4a1a; border-radius: 12px; padding: 20px 24px;
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px;
  }
  .cartera-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
  .cartera-value { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--gold2); font-weight: 700; margin-top: 4px; }
  .cartera-sub { font-size: 11px; color: #4a7a9b; margin-top: 4px; }

  /* Caso card */
  .casos-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
  }
  .casos-title { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--gold); font-weight: 700; }
  .casos-box { background: var(--navy2); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }

  .caso-row {
    padding: 18px 20px; cursor: pointer; transition: background 0.15s;
    border-bottom: 1px solid var(--border);
  }
  .caso-row:last-child { border-bottom: none; }
  .caso-row:hover { background: var(--navy3); }
  .caso-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .caso-nombre { font-weight: 700; color: var(--gold3); font-size: 15px; }
  .caso-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .caso-etapa { font-size: 11px; color: #4a7a9b; margin-top: 4px; }
  .caso-monto { text-align: right; }
  .caso-monto-valor { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--gold2); }
  .caso-mora { font-size: 10px; color: #ff9060; margin-top: 2px; }
  .caso-ver { font-size: 10px; color: #4a7a9b; margin-top: 4px; }

  /* Badge */
  .badge {
    font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
    letter-spacing: 1px; text-transform: uppercase; display: inline-block;
  }
  .badge-prejudicial { background: #1a3a5c; color: #60b4ff; }
  .badge-judicial { background: #3a1a1a; color: #ff7070; }
  .badge-pagado { background: #1a3a1a; color: #70e070; }

  /* Etapa bar */
  .etapa-bar { display: flex; gap: 4px; margin-top: 16px; }
  .etapa-seg { flex: 1; height: 5px; border-radius: 3px; }
  .etapa-active { background: var(--gold); }
  .etapa-inactive { background: var(--border); }
  .etapa-label { font-size: 11px; color: var(--gold); margin-top: 6px; font-weight: 600; }

  /* Detalle */
  .detalle { display: none; }
  .detalle.visible { display: block; }
  .lista.hidden { display: none; }

  .back-btn {
    background: transparent; border: none; color: var(--muted); cursor: pointer;
    font-size: 13px; margin-bottom: 20px; padding: 0; display: flex; align-items: center; gap: 6px;
    font-family: 'Inter', sans-serif;
  }
  .back-btn:hover { color: var(--text); }

  .hero-card {
    background: linear-gradient(135deg, var(--navy2), #0a2a3a);
    border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 16px;
  }
  .hero-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
  .hero-nombre { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--gold3); font-weight: 700; margin-top: 6px; }
  .hero-sub { font-size: 13px; color: var(--muted); margin-top: 6px; }

  .montos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }

  .info-card {
    background: var(--navy2); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin-bottom: 16px;
  }
  .info-card-title {
    font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 700;
    margin-bottom: 16px;
  }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .info-item-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .info-item-value { font-size: 13px; color: var(--text); margin-top: 3px; }

  /* Gestión form */
  .gestion-box {
    background: var(--navy2); border: 1px solid var(--border); border-radius: 12px; padding: 20px;
  }
  .gestion-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .gestion-title { font-family: 'Playfair Display', serif; font-size: 14px; color: var(--gold); font-weight: 700; }
